name: Web — Typecheck & Deploy

on:
  push:
    branches: [main]
    paths:
      - apps/web/**
      - packages/**
      - .github/workflows/web.yml

concurrency:
  group: web-deploy
  cancel-in-progress: false

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm turbo typecheck --filter=@muzgram/web

  deploy:
    name: Deploy to Vercel
    needs: typecheck
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
          working-directory: apps/web
          vercel-args: --prod
        env:
          DATABASE_READ_URL: ${{ secrets.DATABASE_READ_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          NEXT_PUBLIC_API_URL: https://api.muzgram.com
          NEXT_PUBLIC_APP_SCHEME: muzgram
      - name: Ping Google sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://muzgram.com/sitemap.xml"
